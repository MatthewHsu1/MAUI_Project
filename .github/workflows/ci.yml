name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  dotnet-tests:
    name: dotnet-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # The MAUI host project (src/AppName.Maui) is intentionally not built here:
      # it requires the MAUI workload + platform SDKs. The platform-neutral layers
      # (Domain / Application / Infrastructure) carry the unit tests and build on
      # a plain runner.
      - name: Test Domain
        run: dotnet test tests/AppName.Domain.Tests/AppName.Domain.Tests.csproj --configuration Release

      - name: Test Application
        run: dotnet test tests/AppName.Application.Tests/AppName.Application.Tests.csproj --configuration Release

      - name: Test Infrastructure
        run: dotnet test tests/AppName.Infrastructure.Tests/AppName.Infrastructure.Tests.csproj --configuration Release

  web-tests:
    name: web-tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/web
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: src/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build
